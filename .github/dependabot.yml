# Dependabot keeps dependencies patched and surfaces known-vulnerable versions.
# Docs: https://docs.github.com/code-security/dependabot
version: 2
updates:
  # Python dependencies (pip / requirements.txt / pyproject)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "deps"
      include: "scope"

  # GitHub Actions used in workflows (pin & patch action versions)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
